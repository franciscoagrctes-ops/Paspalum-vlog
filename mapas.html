<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mapas de Distribución - Paspalum</title>
  <style>
    :root {
      --verde: #2e6930;
      --verde-oscuro: #143323;
      --blanco-translucido: rgba(255, 255, 255, 0.65);
      --texto-oscuro: #1a1a1a;
      --texto-mutado: #4a4a4a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(90deg, rgba(20, 51, 35, .3), rgba(20, 51, 35, .1)),
        url("palmar.png") center / cover fixed,
        linear-gradient(135deg, #39234a, #e46f3d 45%, #f5bd58);
      display: grid;
      align-items: center;
      justify-content: center;
      padding: 30px 15px;
      font-size: 14px; /* Misma escala tipográfica reducida */
    }

    /* MISMO CUADRO ANCHO Y ULTRA DIFUMINADO */
    .contenedor-principal {
      max-width: 1400px;
      width: 100%;
      background: var(--blanco-translucido);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 24px;
      padding: 65px 80px;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.1);
      color: var(--texto-oscuro);
    }

    .header-seccion {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      padding-bottom: 14px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 3vw, 2rem); /* Letra más chica */
      font-weight: 800;
      letter-spacing: -0.01em;
    }
    h1 em { font-style: italic; }

    .btn-volver {
      display: inline-flex;
      padding: 8px 16px;
      border-radius: 999px;
      color: var(--texto-oscuro);
      background: rgba(0, 0, 0, 0.04);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.8rem;
      border: 1px solid rgba(0, 0, 0, 0.05);
      transition: background 0.2s ease, transform 0.2s ease;
    }
    .btn-volver:hover {
      background: rgba(0, 0, 0, 0.07);
      transform: translateX(-1px);
    }

    .visor-mapa {
      background: rgba(255, 255, 255, 0.5);
      border: 2px dashed rgba(0, 0, 0, 0.1);
      border-radius: 16px;
      min-height: 450px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 30px;
      color: var(--texto-mutated);
    }
    .visor-mapa em { font-style: italic; }

    /* --- AVATAR INTERACTIVO --- */
    .avatar-bot {
      position: fixed;
      right: 25px;
      bottom: 25px;
      z-index: 20;
      display: grid;
      justify-items: center;
      gap: 6px;
      cursor: grab;
      user-select: none;
      touch-action: none;
      transform: translate(var(--look-x, 0), var(--look-y, 0));
      transition: transform .1s ease-out;
    }
    .avatar-bot:active { cursor: grabbing; }

    .avatar-bot img {
      width: clamp(100px, 14vw, 160px);
      height: clamp(100px, 14vw, 160px);
      object-fit: contain;
      filter: drop-shadow(0 15px 20px rgba(0, 0, 0, .25));
      animation: saludar 2s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .avatar-bubble {
      max-width: 170px;
      padding: 8px 12px;
      border-radius: 16px 16px 4px 16px;
      color: var(--verde-oscuro);
      background: rgba(255, 247, 223, .9);
      box-shadow: 0 10px 25px rgba(0, 0, 0, .15);
      font-size: .8rem;
      font-weight: 700;
      text-align: center;
      pointer-events: none;
    }

    @keyframes saludar {
      from { rotate: -1.5deg; }
      to { rotate: 3.5deg; }
    }
  </style>
</head>
<body>

  <main class="contenedor-principal">
    
    <header class="header-seccion">
      <h1>Distribution Maps</h1>
      <a href="index.html" class="btn-volver">← Volver al Inicio</a>
    </header>

    <section class="visor-mapa">
      <div>
        <p style="font-size: 1.2rem; margin-bottom: 6px; font-weight: 700;">📍 Próximamente: Visor interactivo</p>
        <p>Aquí se desplegarán las coordenadas de distribución para los géneros de <em>Paspalum</em>.</p>
      </div>
    </section>

  </main>

  <div class="avatar-bot" id="avatarBot">
    <div class="avatar-bubble">¡Estás en Mapas! 🗺️</div>
    <img src="avatar.png" alt="Avatar interactivo" id="avatarImg">
  </div>

  <script>
    const avatar = document.querySelector('#avatarBot');
    let dragging = false;
    let offsetX = 0;
    let offsetY = 0;

    document.addEventListener('pointermove', (event) => {
      if (dragging) {
        avatar.style.left = `${event.clientX - offsetX}px`;
        avatar.style.top = `${event.clientY - offsetY}px`;
        avatar.style.right = 'auto';
        avatar.style.bottom = 'auto';
      }
      const box = avatar.getBoundingClientRect();
      const centerX = box.left + box.width / 2;
      const centerY = box.top + box.height / 2;
      const lookX = Math.max(-10, Math.min(10, (event.clientX - centerX) / 30));
      const lookY = Math.max(-8, Math.min(8, (event.clientY - centerY) / 38));
      avatar.style.setProperty('--look-x', `${lookX}px`);
      avatar.style.setProperty('--look-y', `${lookY}px`);
    });

    avatar.addEventListener('pointerdown', (event) => {
      dragging = true;
      const box = avatar.getBoundingClientRect();
      offsetX = event.clientX - box.left;
      offsetY = event.clientY - box.top;
      avatar.setPointerCapture(event.pointerId);
    });

    avatar.addEventListener('pointerup', () => dragging = false);
    avatar.addEventListener('pointercancel', () => dragging = false);
  </script>

</body>
</html>
