<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paspalum Blog</title>
    
    <!-- Fuentes de Google -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        /* Reset básico y tipografía general */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f8f5f0;
            color: #222;
        }

        /* --- Header y Navegación --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: #ffffff;
            border-bottom: 1px solid #eee;
        }

        .header-logo {
            font-size: 1.8rem;
            font-family: 'Cormorant Garamond', serif;
            color: #222;
            display: flex;
            align-items: center;
        }

        .logo-icon {
            margin-right: 10px;
        }

        nav ul {
            display: flex;
            gap: 25px;
            list-style: none;
        }

        nav a {
            text-decoration: none;
            color: #222;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #6f8a71; /* Un tono verde sutil para el hover */
        }

        /* --- Hero Section --- */
        .hero {
            position: relative;
            width: 100%;
            height: 85vh;
            overflow: hidden;
        }

        .hero-background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('palmar.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.20);
            z-index: 2;
        }

        .hero-content {
            position: relative;
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            padding: 0 20px;
        }

        .main-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.8rem, 5vw, 5rem);
            font-weight: 500;
            line-height: 1.15;
            max-width: 950px;
            color: white;
            text-shadow: 0 2px 12px rgba(0,0,0,0.25);
        }

        .paspalum-italics {
            font-style: italic;
        }

        /* Elementos ocultados según tus indicaciones */
        .hero-button,
        .welcome-text {
            display: none;
        }

        /* Ajuste responsive básico */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
                padding: 15px 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Encabezado -->
    <header>
        <div class="header-logo">
            <span class="logo-icon">🌿</span>
            Paspalum blog
        </div>

        <nav>
            <ul>
                <li><a href="#home">HOME</a></li>
                <li><a href="#about">ABOUT</a></li>
            </ul>
        </nav>
    </header>

    <!-- Sección Principal -->
    <main>
        <section class="hero">
            <div class="hero-background-image"></div>
            <div class="hero-overlay"></div>

            <div class="hero-content">
                <h1 class="main-title">
                    Explore the biogeography and environmental preferences of
                    <span class="paspalum-italics">Paspalum</span> species
                </h1>
            </div>
        </section>
    </main>

</body>
</html>
