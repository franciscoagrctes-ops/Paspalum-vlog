<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paspalum Blog</title>
    
    <!-- Fuentes premium unificadas para máxima fluidez -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Capa nublada / brumosa sobre la imagen para suavizarla sin taparla */
            --bg-overlay: linear-gradient(180deg, rgba(34, 43, 36, 0.45) 0%, rgba(24, 28, 25, 0.6) 100%);
            /* Tarjetas tipo niebla traslúcida (efecto sutil de cristal empavonado) */
            --card-glass: rgba(28, 33, 29, 0.45); 
            --text-main: #ffffff;
            --text-muted: #cbd7cc;
            --accent-sage: #c2d6b4; /* Verde salvia más iluminado para ambiente nublado */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.4s ease;
        }

        body {
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            
            /* Tu foto palmar.png de fondo completamente integrada */
            background-image: var(--bg-overlay), url('palmar.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* --- Header integrado --- */
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 60px;
            z-index: 10;
        }

        .header-logo {
            font-size: 1.8rem;
            font-family: 'Cormorant Garamond', serif;
            color: var(--text-main);
            display: flex;
            align-items: center;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .logo-italics {
            font-style: italic;
            font-weight: 500;
            margin-right: 6px;
        }

        .logo-icon {
            font-size: 1.2rem;
            margin-left: 10px;
            opacity: 0.8;
        }

        nav ul {
            display: flex;
            gap: 45px;
            list-style: none;
        }

        nav a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.85rem;
            letter-spacing: 0.15em;
        }

        nav a:hover {
            color: var(--accent-sage);
        }

        /* --- Contenedor Bento Grid --- */
        .container {
            width: 100%;
            max-width: 1140px;
            margin-top: 90px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        /* Cajas modificadas: Cristal nublado de alta definición */
        .card {
            background-color: var(--card-glass);
            padding: 45px;
            border-radius: 32px;
            backdrop-filter: blur(25px); /* Desenfoque profundo tipo niebla */
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            box-shadow: 0 30px 60px rgba(15, 24, 18, 0.15); /* Sombra orgánica suave */
        }

        /* Bloque superior */
        .hero-block-full {
            grid-column: span 3;
            padding: 80px 60px;
            text-align: center;
        }

        /* Rediseño del título: Letra fluida, suave y elegante (Cormorant Garamond) */
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.4rem, 4.2vw, 4.4rem);
            font-weight: 500; /* Peso elegante, no tosco */
            text-transform: uppercase;
            line-height: 1.3;
            letter-spacing: 0.05em; /* Mayor soltura entre letras */
            color: var(--text-main);
            text-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
        }

        /* Integración perfecta de Paspalum dentro del flujo del texto */
        .title-paspalum-italics {
            font-style: italic;
            font-weight: 500;
            text-transform: none; /* Mantiene la naturaleza orgánica de la cursiva */
            color: var(--accent-sage);
            font-family: 'Cormorant Garamond', serif;
            padding: 0 6px;
        }

        /* --- Bloques Inferiores Modulares --- */
        .feature-box {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 230px;
            cursor: pointer;
        }

        .feature-box:hover {
            transform: translateY(-4px);
            background-color: rgba(40, 48, 42, 0.55);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .box-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .box-title {
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            color: var(--text-main);
        }

        .box-icon {
            font-size: 1.3rem;
            opacity: 0.8;
        }

        /* Gráficos sutiles traslúcidos dentro de las cajas */
        .visual-mockup {
            width: 100%;
            height: 90px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            border: 1px dashed rgba(255, 255, 255, 0.08);
            position: relative;
            overflow: hidden;
        }

        /* Líneas minimalistas de mapas */
        .map-line {
            position: absolute;
            width: 140%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-sage), transparent);
            top: 45%;
            left: -20%;
            transform: rotate(-12deg);
        }
        .map-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            background-color: #ffffff;
            border-radius: 50%;
            top: 39%;
            left: 55%;
            box-shadow: 0 0 10px var(--accent-sage);
        }

        /* Curvas suaves del nicho ecológico */
        .niche-curve {
            position: absolute;
            width: 90%;
            height: 90%;
            border: 1px solid rgba(194, 214, 180, 0.25);
            border-radius: 50%;
            bottom: -35%;
            left: 5%;
        }
        .niche-curve-2 {
            position: absolute;
            width: 70%;
            height: 70%;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            bottom: -15%;
            left: 15%;
        }

        /* Mosaico de fotos difuminadas */
        .photo-grid-mockup {
            display: flex;
            gap: 10px;
            height: 100%;
        }
        .photo-dash {
            flex: 1;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
        }

        @media (max-width: 900px) {
            header { padding: 20px 30px; }
            .container { grid-template-columns: 1fr; }
            .hero-block-full { grid-column: span 1; padding: 50px 30px; }
        }
    </style>
</head>
<body>

    <!-- Menú Superior Armonizado -->
    <header>
        <div class="header-logo">
            <span class="logo-italics">Paspalum</span> blog <span class="logo-icon">🌿</span>
        </div>
        <nav>
            <ul>
                <li><a href="#home">HOME</a></li>
                <li><a href="#about">ABOUT</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <!-- Bloque de Título Principal con Tipografía Editorial Fluida -->
        <section class="card hero-block-full">
            <h1>
                Explore the biogeography and environmental preferences of 
                <span class="title-paspalum-italics">Paspalum</span> species
            </h1>
        </section>

        <!-- Bloque 1: Maps -->
        <div class="card feature-box">
            <div class="box-header">
                <span class="box-title">Maps</span>
                <span class="box-icon">🗺️</span>
            </div>
            <div class="visual-mockup">
                <div class="map-line"></div>
                <div class="map-dot"></div>
            </div>
        </div>

        <!-- Bloque 2: Environmental Preferences -->
        <div class="card feature-box">
            <div class="box-header">
                <span class="box-title">Environmental Preferences</span>
                <span class="box-icon">📊</span>
            </div>
            <div class="visual-mockup">
                <div class="niche-curve"></div>
                <div class="niche-curve-2"></div>
            </div>
        </div>

        <!-- Bloque 3: Photos -->
        <div class="card feature-box">
            <div class="box-header">
                <span class="box-title">Photos</span>
                <span class="box-icon">🖼️</span>
            </div>
            <div class="visual-mockup" style="border: none;">
                <div class="photo-grid-mockup">
                    <div class="photo-dash" style="background: rgba(194, 214, 180, 0.12);"></div>
                    <div class="photo-dash"></div>
                    <div class="photo-dash"></div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
