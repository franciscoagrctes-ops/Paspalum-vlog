<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paspalum Blog</title>
    
    <!-- Fuentes premium -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Colores oscuros y translúcidos basados en image_6f4334.png */
            --bg-overlay: linear-gradient(180deg, rgba(10, 18, 12, 0.82) 0%, rgba(18, 18, 18, 0.9) 100%);
            --card-glass: rgba(30, 35, 31, 0.75); /* Tarjetas translúcidas tipo cristal oscuro */
            --text-main: #ffffff;
            --text-muted: #b8c2b9;
            --accent-sage: #a8b99a;
        }

        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body {
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            
            /* LA FOTO EN EL FONDO GLOBAL */
            background-image: var(--bg-overlay), url('palmar.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Mantiene el fondo quieto al hacer scroll para un efecto premium */
        }

        /* --- Header integrado arriba --- */
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 60px;
            z-index: 10;
        }

        .header-logo {
            font-size: 1.6rem;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        nav ul {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        nav a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
        }

        nav a:hover {
            color: var(--accent-sage);
        }

        /* --- Estructura Bento Grid (Contenedor) --- */
        .container {
            width: 100%;
            max-width: 1140px;
            margin-top: 80px; /* Espacio para el header absolute */
            display: grid;
            grid-template-columns: 1.8fr 1.2fr;
            gap: 24px;
        }

        /* Bloques de diseño estilo cristalera oscura */
        .card {
            background-color: var(--card-glass);
            padding: 45px;
            border-radius: 28px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        /* Bloque principal del título */
        .hero-block {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.5rem, 4vw, 3.8rem);
            font-weight: 600;
            line-height: 1.2;
            margin-bottom: 15px;
            letter-spacing: -0.01em;
        }

        .paspalum-italics {
            font-style: italic;
            font-weight: 500;
            color: var(--accent-sage);
        }

        /* Tarjeta lateral destacada (Miniatura con la planta) */
        .featured-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .plant-avatar-container {
            width: 140px;
            height: 140px;
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(0,0,0,0.2));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            font-size: 3.5rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .cta-button {
            background-color: var(--text-main);
            color: #121212;
            padding: 12px 32px;
            border-radius: 50px;
            border: none;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,255,255,0.1);
        }

        .cta-button:hover {
            transform: translateY(-2px);
            background-color: var(--accent-sage);
            color: #ffffff;
            box-shadow: 0 8px 20px rgba(168, 185, 154, 0.3);
        }

        /* Fila inferior de 4 columnas */
        .features-grid {
            grid-column: span 2;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .feature-box {
            background-color: rgba(30, 35, 31, 0.6); /* Un toque más ligero */
            padding: 30px 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .feature-box h3 {
            font-size: 1.8rem;
            font-weight: 300;
            color: var(--accent-sage);
            margin-bottom: 8px;
            font-family: 'Inter', sans-serif;
        }

        .feature-box p {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* Ajustes Mobile */
        @media (max-width: 900px) {
            header { padding: 20px; }
            nav ul { gap: 20px; }
            .container { grid-template-columns: 1fr; margin-top: 100px; }
            .features-grid { grid-column: span 1; grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 500px) {
            .features-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Menú minimalista superior -->
    <header>
        <div class="header-logo">Paspalum blog</div>
        <nav>
            <ul>
                <li><a href="#home">HOME</a></li>
                <li><a href="#about">ABOUT</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <!-- Bloque Principal de Texto -->
        <section class="card hero-block">
            <h1>
                Explore the biogeography and environmental preferences of 
                <span class="paspalum-italics">Paspalum</span> species
            </h1>
        </section>

        <!-- Bloque de Imagen Destacada (Estilo Maceta Minimalista de la derecha) -->
        <div class="card featured-card">
            <div class="plant-avatar-container">🌿</div>
            <button class="cta-button">Explore Details ↗</button>
        </div>

        <!-- Cuadrícula inferior inspirada en los números 1, 2, 3, 4 de image_6f4334.png -->
        <section class="features-grid">
            <div class="feature-box">
                <h3>01</h3>
                <p>Biogeography</p>
            </div>
            <div class="feature-box">
                <h3>02</h3>
                <p>Preferences</p>
            </div>
            <div class="feature-box">
                <h3>03</h3>
                <p>Habitats</p>
            </div>
            <div class="feature-box">
                <h3>04</h3>
                <p>Biodiversity</p>
            </div>
        </section>
    </div>

</body>
</html>
