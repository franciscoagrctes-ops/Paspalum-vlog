<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paspalum Blog</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent: #a8b99a;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        /* Bloques de diseño */
        .card {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
        }

        /* Header / Hero */
        .hero { grid-column: span 1; }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; line-height: 1.1; margin-bottom: 20px; }
        
        /* Imagen destacada (Miniatura tipo card) */
        .featured-card { grid-column: span 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .plant-placeholder { width: 150px; height: 150px; background: #333; border-radius: 50%; margin-bottom: 20px; }

        /* Estadísticas / Info lateral */
        .stats { display: flex; flex-direction: column; gap: 15px; }
        .stat-box { background: var(--card-bg); padding: 20px; border-radius: 16px; }

        /* Grid de 4 columnas inferior */
        .features { grid-column: span 2; display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 20px; }
        .feature-box { background: var(--card-bg); padding: 25px; border-radius: 20px; }
        .feature-box h3 { font-size: 2rem; color: var(--accent); margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <!-- Hero Principal -->
    <section class="card hero">
        <h1>Explore the biogeography and environmental preferences of Paspalum species</h1>
        <p style="color: var(--text-muted)">Un blog dedicado al estudio botánico profundo.</p>
    </section>

    <!-- Miniatura destacada -->
    <div class="card featured-card">
        <div class="plant-placeholder"></div>
        <button style="padding: 10px 20px; border-radius: 20px; border: none; cursor: pointer;">Ver detalles →</button>
    </div>

    <!-- Bloques inferiores (Estilo 4 columnas) -->
    <section class="features">
        <div class="feature-box"><h3>01</h3><p>Biogeografía</p></div>
        <div class="feature-box"><h3>02</h3><p>Preferencias</p></div>
        <div class="feature-box"><h3>03</h3><p>Hábitats</p></div>
        <div class="feature-box"><h3>04</h3><p>Especies</p></div>
    </section>
</div>

</body>
</html>
