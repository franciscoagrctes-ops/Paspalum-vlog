<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Biogeografía de Paspalum</title>
  <meta name="description" content="Explora mapas y características de especies de Paspalum.">
  <style>
    /* ==========================================================================
       VARIABLES Y REGLAS BASE (Cyber-Botánica)
       ========================================================================== */
    :root {
      --neon-verde: #00ff66;
      --neon-oro: #ffb700;
      --cyber-oscuro: #091a10;
      --blanco-holografico: rgba(255, 255, 255, 0.05);
      --borde-holografico: rgba(0, 255, 102, 0.2);
      --texto-lucido: #f0fff5;
      --texto-mutado: #a3c2b0;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      background-color: var(--cyber-oscuro);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
      /* Fondo cyber fusionado con palmar.png */
      background:
        radial-gradient(circle at 50% 30%, rgba(0, 255, 102, 0.08), transparent 60%),
        linear-gradient(180deg, rgba(9, 26, 16, 0.55), rgba(5, 13, 8, 0.85)),
        url("palmar.png") center / cover fixed;
      color: var(--texto-lucido);
      font-size: 14px;
      display: grid;
      align-items: center;
      justify-content: center;
      padding: 30px 15px;
      overflow-x: hidden;
    }

    /* ==========================================================================
       CONTENEDOR PRINCIPAL: Laboratorio Cuántico / Interfaz Holográfica
       ========================================================================== */
    .contenedor-principal {
      max-width: 1450px;
      width: calc(100% - 40px);
      margin: 40px auto;
      
      /* Glassmorphism de alta densidad para fundirse con el palmar */
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(0, 255, 102, 0.02));
      backdrop-filter: blur(35px) saturate(160%);
      -webkit-backdrop-filter: blur(35px) saturate(160%);
      
      border: 1px solid var(--borde-holografico);
      border-radius: 30px;
      padding: 70px 90px;
      box-shadow: 
        0 0 50px rgba(0, 0, 0, 0.6),
        inset 0 0 30px rgba(0, 255, 102, 0.05);
      position: relative;
    }

    /* Esquina militar/tecnológica */
    .contenedor-principal::before {
      content: "";
      position: absolute;
      top: -1px; left: -1px; width: 30px; height: 30px;
      border-top: 3px solid var(--neon-verde);
      border-left: 3px solid var(--neon-verde);
      border-radius: 30px 0 0 0;
    }

    .hero {
      display: grid;
      gap: 16px;
      margin-bottom: 55px;
    }

    /* CHIP DE NOTIFICACIÓN DEL NÚCLEO */
    .tag {
      width: fit-content;
      padding: 5px 14px;
      border: 1px solid var(--neon-verde);
      border-radius: 6px;
      background: rgba(0, 255, 102, 0.06);
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--neon-verde);
      text-transform: lowercase; /* Forzar minúsculas */
      letter-spacing: 0.05em;
      box-shadow: 0 0 15px rgba(0, 255, 102, 0.15);
    }
    .tag em { font-style: normal; text-shadow: 0 0 5px var(--neon-verde); }

    /* TÍTULO CON MÁSCARA DE BRILLO */
    h1 {
      max-width: 950px;
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      line-height: 1.2;
      font-weight: 900;
      letter-spacing: -0.02em;
      background: linear-gradient(120deg, #ffffff 40%, var(--neon-verde) 90%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    h1 em {
      font-style: italic;
      text-shadow: 0 0 20px rgba(0, 255, 102, 0.4);
    }

    .intro {
      max-width: 750px;
      margin: 0;
      color: var(--texto-mutado);
      font-size: 1rem;
      line-height: 1.6;
    }

    /* BOTÓN CUÁNTICO */
    .button {
      display: inline-flex;
      width: fit-content;
      margin-top: 12px;
      padding: 12px 26px;
      border-radius: 12px;
      color: #000000;
      background: var(--neon-verde);
      text-decoration: none;
      font-weight: 800;
      font-size: 0.88rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      box-shadow: 0 0 20px rgba(0, 255, 102, 0.3);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      border: 1px solid transparent;
    }
    .button:hover {
      background: transparent;
      color: var(--neon-verde);
      border-color: var(--neon-verde);
      box-shadow: 0 0 35px rgba(0, 255, 102, 0.6);
      transform: translateY(-2px);
    }

    /* ==========================================================================
       STATS: Módulos de Datos Inteligentes con Escaneo Láser
       ========================================================================== */
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 25px;
      margin-top: 35px;
    }

    .stat {
      min-width: 140px;
      padding: 18px 22px;
      border-radius: 16px;
      background: rgba(9, 26, 16, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 255, 102, 0.15);
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    .stat:hover {
      border-color: var(--neon-verde);
      box-shadow: 0 0 20px rgba(0, 255, 102, 0.15);
      transform: scale(1.03);
    }
    .stat::after {
      content: "";
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon-verde), transparent);
      animation: escaneo-laser 3s infinite linear;
    }

    .stat span {
      display: block;
      font-size: 1.4rem;
      margin-bottom: 6px;
    }
    .stat strong {
      display: block;
      font-size: 1.4rem;
      color: #ffffff;
      font-family: monospace;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
    }
    .stat small {
      color: var(--texto-mutado);
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    /* ==========================================================================
       CARDS: Nodos de Red Neuronal
       ========================================================================== */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 26px;
    }

    .card {
      padding: 26px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.02);
      text-decoration: none;
      color: inherit;
      display: block;
      position: relative;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .card-link::before {
      content: "LINK //";
      position: absolute;
      top: 12px; right: 16px;
      font-size: 0.6rem;
      color: var(--neon-verde);
      opacity: 0.3;
      font-family: monospace;
    }
    .card-link:hover {
      transform: translateY(-5px) scale(1.01);
      background: rgba(0, 255, 102, 0.03);
      border-color: var(--neon-verde);
      box-shadow: 
        0 15px 30px rgba(0, 0, 0, 0.4),
        0 0 20px rgba(0, 255, 102, 0.1);
    }

    .card strong {
      display: block;
      color: var(--neon-verde);
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 8px;
      text-shadow: 0 0 10px rgba(0, 255, 102, 0.2);
    }
    .card p {
      margin: 0;
      color: var(--texto-mutado);
      font-size: 0.88rem;
      line-height: 1.5;
    }
    .card p em { font-style: italic; color: #ffffff; }

    /* ==========================================================================
       AVATAR: ASISTENTE INTERACTIVO HOLOGRÁFICO
       ========================================================================== */
    .avatar-bot {
      position: fixed;
      right: 35px;
      bottom: 35px;
      z-index: 100;
      display: grid;
      justify-items: center;
      gap: 10px;
      cursor: grab;
      user-select: none;
      touch-action: none;
      transform: translate(var(--look-x, 0), var(--look-y, 0));
      transition: transform .1s ease-out;
    }
    .avatar-bot:active { cursor: grabbing; }
    .avatar-bot::before {
      content: "";
      position: absolute;
      width: 140px; height: 140px;
      bottom: 20px;
      background: radial-gradient(circle, rgba(0, 255, 102, 0.25) 0%, transparent 70%);
      border-radius: 50%;
      z-index: -1;
      animation: pulso-cuantico 2.5s infinite alternate ease-in-out;
      pointer-events: none;
    }

    .avatar-bot img {
      width: clamp(110px, 15vw, 170px);
      height: clamp(110px, 15vw, 170px);
      object-fit: contain;
      filter: drop-shadow(0 0 15px rgba(0, 255, 102, 0.4)) saturate(130%) contrast(110%);
      animation: flotar-holograma 3.5s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .avatar-bubble {
      max-width: 190px;
      padding: 10px 14px;
      border-radius: 12px 12px 4px 12px;
      color: #ffffff;
      background: rgba(9, 26, 16, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--neon-verde);
      box-shadow: 0 10px 30px rgba(0, 255, 102, 0.2);
      font-size: .8rem;
      font-weight: 700;
      font-family: monospace;
      text-align: center;
      pointer-events: none;
    }
    .avatar-bubble::before {
      content: "AI_SYSTEM // ";
      display: block;
      font-size: 0.55rem;
      color: var(--neon-verde);
      margin-bottom: 4px;
      letter-spacing: 0.1em;
    }

    /* ==========================================================================
       ANIMACIONES
       ========================================================================== */
    @keyframes flotar-holograma {
      0% { transform: translateY(0px) rotate(-1deg); filter: drop-shadow(0 0 10px rgba(0, 255, 102, 0.3)) saturate(120%); }
      50% { filter: drop-shadow(0 0 18px rgba(0, 255, 102, 0.5)) saturate(150%) hue-rotate(5deg); }
      100% { transform: translateY(-12px) rotate(2deg); filter: drop-shadow(0 0 25px rgba(0, 255, 102, 0.4)) saturate(130%); }
    }
    @keyframes pulso-cuantico {
      from { transform: scale(0.8); opacity: 0.4; }
      to { transform: scale(1.3); opacity: 0.8; }
    }
    @keyframes escaneo-laser {
      0% { left: -100%; }
      50%, 100% { left: 100%; }
    }

    @media (max-width: 768px) {
      .contenedor-principal { padding: 45px 25px; width: calc(100% - 20px); margin: 20px auto; }
      .cards { grid-template-columns: 1fr; }
      .avatar-bot { right: 20px; bottom: 20px; }
    }
  </style>
</head>
<body>

  <main class="contenedor-principal">
    
    <section class="hero" aria-label="Presentación">
      <span class="tag">bienvenido al blog de <em>paspalum</em></span> 
      <h1>Discover the biogeography, environmental preferences, and agronomic characteristics of <em>Paspalum</em> species.</h1>
      <p class="intro">Explore occurrence records, distribution maps and photographs.</p>
      
      <a class="button" href="#contenido">View content</a>

      <div class="stats" aria-label="Scientific database statistics">
        <div class="stat">
          <span>📍</span>
          <strong>4,200+</strong>
          <small>Records</small>
        </div>
        <div class="stat">
          <span>📷</span>
          <strong>1,300+</strong>
          <small>Photos</small>
        </div>
        <div class="stat">
          <span>🧬</span>
          <strong>25+</strong>
          <small>Traits</small>
        </div>
      </div>
    </section>
