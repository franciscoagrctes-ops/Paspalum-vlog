<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paspalum Blog</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Montserrat:wght@200;300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Capa brumosa oscura ultra-premium */
            --bg-overlay: linear-gradient(180deg,rgba(15,25,18,.35) 0%,rgba(10,18,12,.55) 100%);
            /* Cristal translúcido ahumado oscuro */
            --card-glass-bottom: rgba(13, 16, 14, 0.8);
            --bg-overlay: radial-gradient(circle at 50% 18%, rgba(156, 177, 129, 0.18), transparent 34%), linear-gradient(180deg, rgba(7, 15, 9, 0.50) 0%, rgba(4, 9, 6, 0.82) 100%);
            --card-glass-bottom: rgba(13, 16, 14, 0.74);
            --text-main: #ffffff;
            --text-muted: #9fa8a0;
            --accent-sage: #8fa382; /* Verde salvia orgánico apagado */
            --border-subtle: rgba(143, 163, 130, 0.25);
            --text-muted: #c3cdbd;
            --accent-sage: #a8bf8d;
            --accent-warm: #e8dcc0;
            --border-subtle: rgba(168, 191, 141, 0.32);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.4s ease;
            scroll-behavior: smooth;
        }

        body {
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
            padding: 32px 20px 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            
            /* Fondo palmar.png integrado */
            background-image: var(--bg-overlay), url('palmar.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #050706;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(115deg, rgba(255,255,255,0.10), transparent 22%, transparent 72%, rgba(168,191,141,0.12));
            mix-blend-mode: screen;
            opacity: .55;
        }

        /* --- Header Superior --- */
        header {
            position: absolute;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 35px 80px;
            padding: 24px clamp(24px, 6vw, 80px);
            background: linear-gradient(180deg, rgba(5, 10, 7, .62), transparent);
            backdrop-filter: blur(2px);
            z-index: 10;
        }

        .header-logo {
            font-size: 1.8rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            letter-spacing: 0.02em;
        }

        .logo-genus {
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
        }

        .header-logo svg {
            width: 24px;
            height: 24px;
            margin-right: 12px;
            fill: var(--accent-sage);
        }

        nav ul {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        nav a {
            text-decoration: none;
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
        }

        nav a.active, nav a:hover {
            color: var(--text-main);
            border-bottom: 1px solid var(--accent-sage);
            padding-bottom: 4px;
        }

        /* --- Contenedor Principal (Bento Grid) --- */
        .container {
            width: 100%;
            max-width: 1100px;
            margin-top: 80px;
            margin-top: 92px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            gap: 22px;
        }

        /* Tarjeta Central del Hero (Ajustada y estilizada) */
        .hero-card {
            grid-column: span 3;
            max-width: 850px;
            width: 100%;
            margin: 0 auto; /* Centra el bloque dentro del contenedor bento */
            background: rgba(0, 0, 0, 0.03);
            background: linear-gradient(145deg, rgba(7, 21, 12, 0.66), rgba(7, 13, 9, 0.42));
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.55);
            border-radius: 0px;
            padding: 60px 40px;
            border: 1px solid rgba(255, 255, 255, 0.45);
            border-radius: 28px;
            padding: clamp(44px, 7vw, 76px) clamp(24px, 6vw, 64px);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: none;
            outline: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 90px rgba(0, 0, 0, .42), inset 0 1px 0 rgba(255,255,255,.14);
            outline: 1px solid rgba(255, 255, 255, 0.12);
            outline-offset: 10px;
        }

        /* Detalles Ornamentales */
        .decor-icon {
            width: 20px;
            height: 20px;
            fill: var(--accent-sage);
            margin: 10px 0;
            opacity: 0.8;
        }

        .divider-line {
            width: 120px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-subtle), transparent);
            margin: 15px 0;
        }

        /* Tipografía del Título Central Rediseñada */
        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(2rem, 4vw, 3.2rem); 
            font-weight: 200;
            line-height: 1.3;
            letter-spacing: -0.02em;
            letter-spacing: 0.015em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, .95);
            color: rgba(255, 255, 255, .94);
            text-shadow: 0 8px 36px rgba(0,0,0,.48);
            max-width: 1000px;
        }

        /* Armonización de Paspalum dentro de la fuente moderna */
        .italics-species {
            font-family: inherit;
            font-style: normal;
            font-weight: 600;
            color: rgba(255, 255, 255, 1);
            color: var(--accent-warm);
        }

        /* Botón Ovalado Minimalista */
        .cta-button {
            background-color: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.85);
            border: 1px solid var(--border-subtle);
            padding: 12px 35px;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-size: 0.78rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 30px;
            margin-top: 32px;
            text-decoration: none;
            transition: transform .3s ease, background-color .3s ease, border-color .3s ease;
        }

        .cta-button svg {
            width: 14px;
            height: 14px;
            fill: var(--accent-sage);
        }

        .cta-button:hover {
            background-color: rgba(143, 163, 130, 0.15);
            border-color: var(--accent-sage);
            color: #fff;
            transform: translateY(-2px);
        }

        /* --- Bloques Inferiores Simétricos --- */
        .feature-box {
            background-color: var(--card-glass-bottom);
            border-radius: 20px;
            background: linear-gradient(180deg, rgba(19, 29, 21, .78), rgba(10, 14, 11, .78));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 35px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 190px;
            min-height: 156px;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.34);
            transition: transform .3s ease, background-color .3s ease, border-color .3s ease;
            text-decoration: none;
            color: inherit;
        }

        .feature-box:hover {
            transform: translateY(-5px);
            background-color: rgba(24, 30, 26, 0.85);
            border-color: var(--border-subtle);
        }

        .feature-icon {
            width: 32px;
            height: 32px;
            fill: var(--accent-sage);
            margin-bottom: 18px;
        }

        .feature-title {
            font-size: 1.15rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 0.02em;
        }

        .feature-line {
            width: 18px;
            height: 1px;
            background-color: var(--accent-sage);
            margin-top: 12px;
            opacity: 0.6;
        }

        /* Responsive */
        @media (max-width: 850px) {
            header { padding: 25px 40px; }
            .container { grid-template-columns: 1fr; }
            .hero-card { grid-column: span 1; padding: 40px 20px; }
        }

        @media (max-width: 620px) {
            body { padding: 20px 14px 40px; }
            header { position: static; padding: 10px 6px 24px; flex-direction: column; gap: 18px; background: transparent; }
            .header-logo { font-size: 1.35rem; }
            nav ul { gap: 24px; }
            .container { margin-top: 0; }
            h1 { font-size: clamp(1.7rem, 9vw, 2.4rem); }
        }
    </style>
</head>
