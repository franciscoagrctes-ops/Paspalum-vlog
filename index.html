<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paspalum Blog</title>
    
    <!-- Fuentes premium: Inter para datos y Montserrat/Cormorant para el toque editorial -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Cormorant+Garamond:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-overlay: linear-gradient(180deg, rgba(10, 18, 12, 0.85) 0%, rgba(15, 15, 15, 0.92) 100%);
            --card-glass: rgba(25, 30, 26, 0.8);
            --text-main: #ffffff;
            --text-muted: #9ba89c;
            --accent-sage: #a8b99a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body {
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            
            /* Tu foto palmar.png de fondo global */
            background-image: var(--bg-overlay), url('palmar.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* --- Header Minimalista --- */
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 60px;
            z-index: 10;
        }

        .header-logo {
            font-size: 1.8rem;
            font-family: 'Cormorant Garamond', serif;
            color: var(--text-main);
            display: flex;
            align-items: center;
        }

        .logo-italics {
            font-style: italic;
            font-weight: 600;
            margin-right: 6px;
        }

        .logo-icon {
            font-size: 1.3rem;
            margin-left: 10px;
            opacity: 0.9;
        }

        nav ul {
            display: flex;
            gap: 45px;
            list-style: none;
        }

        nav a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.15em;
        }

        nav a:hover {
            color: var(--accent-sage);
        }

        /* --- Estructura Bento Grid (Actualizada de image_6f3884.jpg) --- */
        .container {
            width: 100%;
            max-width: 1200px;
            margin-top: 100px;
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 columnas perfectas */
            gap: 24px;
        }

        /* Bloques base estilo cristal premium */
        .card {
            background-color: var(--card-glass);
            padding: 40px;
            border-radius: 28px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }

        /* Bloque del título expandido (Cubre todo el ancho) */
        .hero-block-full {
            grid-column: span 3;
            padding: 70px 60px;
            text-align: center;
        }

        /* Título modificado: Mayúsculas, extra grueso y gigante */
        h1 {
            font-family: 'Inter', sans-serif;
            font-size: clamp(2.2rem, 3.8vw, 4.2rem);
            font-weight: 800; /* Extra grueso */
            text-transform: uppercase; /* Todo en mayúsculas */
            line-height: 1.2;
            letter-spacing: 0.02em;
            color: var(--text-main);
        }

        .title-paspalum-italics {
            font-style: italic;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            text-transform: none; /* Mantiene la elegancia natural de la especie */
            color: var(--accent-sage);
            padding: 0 8px;
        }

        /* --- Fila inferior de 3 bloques --- */
        .feature-box {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 220px;
            cursor: pointer;
        }

        .feature-box:hover {
            transform: translateY(-5px);
            background-color: rgba(35, 43, 37, 0.9);
            border-color: rgba(168, 185, 154, 0.2);
        }

        /* Elementos visuales dentro de los bloques */
        .box-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .box-title {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: var(--text-main);
        }

        .box-icon {
            font-size: 1.5rem;
            opacity: 0.8;
        }

        /* Representación del mapa moderno y nicho ecológico sin agregar texto */
        .visual-mockup {
            width: 100%;
            height: 90px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        /* Mockup gráfico abstracto de mapa */
        .map-line {
            position: absolute;
            width: 140%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-sage), transparent);
            top: 40%;
            left: -20%;
            transform: rotate(-15deg);
        }
        .map-dot {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #ffffff;
            border-radius: 50%;
            top: 35%;
            left: 50%;
            box-shadow: 0 0 12px #fff;
        }

        /* Mockup gráfico abstracto de nicho ecológico / curvas complejas */
        .niche-curve {
            position: absolute;
            width: 80%;
            height: 80%;
            border: 2px solid rgba(168, 185, 154, 0.3);
            border-radius: 50%;
            bottom: -30%;
            left: 10%;
        }
        .niche-curve-2 {
            position: absolute;
            width: 60%;
            height: 60%;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            bottom: -10%;
            left: 25%;
        }

        /* Mosaico minimalista para simular fotos */
        .photo-grid-mockup {
            display: flex;
            gap: 8px;
            height: 100%;
        }
        .photo-dash {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            header { padding: 20px; }
            .container { grid-template-columns: 1fr; }
            .hero-block-full { grid-column: span 1; padding: 40px 25px; }
        }
    </style>
</head>
<body>

    <!-- Encabezado con Logo estilizado -->
    <header>
        <div class="header-logo">
            <span class="logo-italics">Paspalum</span> blog <span class="logo-icon">🌿</span>
        </div>
        <nav>
            <ul>
                <li><a href="#home">HOME</a></li>
                <li><a href="#about">ABOUT</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <!-- Bloque de Título Principal Expandido -->
        <section class="card hero-block-full">
            <h1>
                Explore the biogeography and environmental preferences of 
                <span class="title-paspalum-italics">Paspalum</span> species
            </h1>
        </section>

        <!-- Bloque 1: Maps -->
        <div class="card feature-box">
            <div class="box-header">
                <span class="box-title">Maps</span>
                <span class="box-icon">🗺️</span>
            </div>
            <div class="visual-mockup">
                <div class="map-line"></div>
                <div class="map-dot"></div>
            </div>
        </div>

        <!-- Bloque 2: Environmental Preferences -->
        <div class="card feature-box">
            <div class="box-header">
                <span class="box-title">Environmental Preferences</span>
                <span class="box-icon">📊</span>
            </div>
            <div class="visual-mockup">
                <div class="niche-curve"></div>
                <div class="niche-curve-2"></div>
            </div>
        </div>

        <!-- Bloque 3: Photos -->
        <div class="card feature-box">
            <div class="box-header">
                <span class="box-title">Photos</span>
                <span class="box-icon">🖼️</span>
            </div>
            <div class="visual-mockup" style="border: none;">
                <div class="photo-grid-mockup">
                    <div class="photo-dash" style="background: rgba(168, 185, 154, 0.2);"></div>
                    <div class="photo-dash"></div>
                    <div class="photo-dash"></div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
