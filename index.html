<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paspalum Blog</title>
    
    <!-- Fuentes de Google: Cormorant Garamond e Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        /* Variables con tu paleta de colores premium */
        :root {
            --white: #FFFFFF;
            --off-white: #F8F7F3;
            --sage-green: #A8B99A;
            --dark-green: #2F4F46;
            --beige: #EAE3D8;
            --text-dark: #2F4F46; /* Usamos el verde oscuro para los textos principales */
        }

        /* Reset básico y tipografía premium */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.4s ease; /* Efecto premium global para interactivos */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--off-white);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* --- Header Minimalista y Refinado --- */
        header {
            position: fixed; /* Lo fijamos arriba con blur sutil */
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 60px; /* Más bajo y estilizado */
            background-color: rgba(255, 255, 255, 0.8); /* Blanco puro con transparencia */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(168, 185, 154, 0.15); /* Línea muy fina verde salvia */
            z-index: 10;
        }

        .header-logo {
            font-size: 1.5rem; /* Más pequeño y refinado */
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            color: var(--dark-green);
            display: flex;
            align-items: center;
            letter-spacing: -0.01em;
        }

        .logo-icon {
            font-size: 1.2rem;
            margin-right: 8px;
            opacity: 0.8;
        }

        nav ul {
            display: flex;
            gap: 45px; /* Más espacio entre HOME y ABOUT */
            list-style: none;
        }

        nav a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 500;
            font-size: 0.85rem; /* Tipografía limpia */
            letter-spacing: 0.12em; /* Estilo editorial */
        }

        nav a:hover {
            color: var(--sage-green); /* Hover verde salvia */
        }

        /* --- Hero Section (Luz suave y estilo editorial) --- */
        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 60px; /* Compensación por el header fijo */
            background-color: var(--beige);
        }

        .hero-background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('palmar.png'); /* Aquí va tu foto con tonos salvia/crema */
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* Capa sutil para unificar tonos mañana/crema sin oscurecer agresivamente */
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(248, 247, 243, 0.2) 0%, rgba(234, 227, 216, 0.4) 100%);
            z-index: 2;
        }

        /* Detalles orgánicos / siluetas decorativas flotando detrás de la tarjeta */
        .organic-decor {
            position: absolute;
            width: 120%;
            height: 120%;
            top: -10%;
            left: -10%;
            z-index: 2;
            pointer-events: none;
            opacity: 0.15; /* Sutiles ilustraciones botánicas transparentes */
            background-image: radial-gradient(var(--sage-green) 1px, transparent 0);
            background-size: 40px 40px;
        }

        .hero-content {
            position: relative;
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 0 24px;
        }

        /* --- Caja del Título: Glassmorphism Soft --- */
        .main-title-container {
            background-color: rgba(255, 255, 255, 0.45); /* Blanco translúcido premium */
            padding: 60px 80px;
            border-radius: 32px; /* Esquinas redondeadas grandes */
            backdrop-filter: blur(12px); /* Efecto premium de desenfoque */
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(168, 185, 154, 0.3); /* Borde verde salvia muy fino */
            max-width: 850px;
            box-shadow: 0 15px 35px rgba(47, 79, 70, 0.05); /* Sombra ultra delicada */
            text-align: center;
        }

        /* Título más vertical y elegante */
        .main-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.8rem, 4.5vw, 4.2rem); 
            font-weight: 500;
            line-height: 1.3; /* Más espacio vertical interlineado */
            color: var(--dark-green);
        }

        .main-title span.line-break {
            display: block; /* Fuerza el formato editorial en bloques prolijos */
        }

        .paspalum-italics {
            font-style: italic;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 500;
            color: var(--dark-green);
        }

        /* Elementos ocultados */
        .hero-button,
        .welcome-text {
            display: none;
        }

        /* Ajuste responsive básico manteniendo la elegancia */
        @media (max-width: 768px) {
            header {
                padding: 15px 30px;
            }
            nav ul {
                gap: 25px;
            }
            .main-title-container {
                padding: 40px 24px;
                margin: 0 10px;
            }
        }
    </style>
</head>
<body>

    <!-- Encabezado Minimalista Fijo -->
    <header>
        <div class="header-logo">
            <span class="logo-icon">🌿</span>
            Paspalum blog
        </div>

        <nav>
            <ul>
                <li><a href="#home">HOME</a></li>
                <li><a href="#about">ABOUT</a></li>
            </ul>
        </nav>
    </header>

    <!-- Sección Principal Estilo Galería Botánica -->
    <main>
        <section class="hero">
            <div class="hero-background-image"></div>
            <div class="hero-overlay"></div>
            <div class="organic-decor"></div> <!-- Elemento de soporte para detalles botánicos de fondo -->

            <div class="hero-content">
                <div class="main-title-container">
                    <h1 class="main-title">
                        <span class="line-break">Explore the Biogeography</span>
                        <span class="line-break">and Environmental Preferences</span>
                        <span class="line-break">of <span class="paspalum-italics">Paspalum</span> Species</span>
                    </h1>
                </div>
            </div>
        </section>
    </main>

</body>
</html>
